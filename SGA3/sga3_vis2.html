<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SGA3 Exposé IX — Groupes de type multiplicatif</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:ital,wght@0,300;0,400;1,300&display=swap');:root { --bg: #03030a; --panel: #0b0b16; --border: #1e2030; --text: #c8cce0; --subtle: #4a4f68; --accent1: #ff4444; --accent2: #44ff88; --accent3: #4488ff; --accent4: #ffee44; --accent5: #ff44ee; --accent6: #44eeff; --gold: #c8a84b; --dim: #2a2d40; }

{ box-sizing: border-box; margin: 0; padding: 0; }


body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Mono', monospace; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px; gap: 20px; }

header { width: 100%; max-width: 1060px; display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid var(--dim); padding-bottom: 10px; } header h1 { font-size: 13px; font-weight: 400; color: var(--gold); letter-spacing: 0.08em; } header span { font-size: 10px; color: var(--subtle); font-family: 'IBM Plex Sans', sans-serif; font-style: italic; }

#layout { display: flex; gap: 20px; width: 100%; max-width: 1060px; align-items: flex-start; }

#canvasWrap { flex: 0 0 auto; display: flex; flex-direction: column; gap: 10px; }

canvas#c { display: block; border: 1px solid var(--border); background: #000; image-rendering: pixelated; }

#controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; font-size: 11px; } .cg { display: flex; align-items: center; gap: 5px; } .lbl { color: var(--subtle); font-size: 10px; min-width: 22px; } input[type=range] { width: 90px; height: 3px; cursor: pointer; accent-color: var(--accent6); vertical-align: middle; } .val { color: var(--accent6); min-width: 42px; font-size: 10px; }

.scene-btn { background: transparent; color: var(--subtle); border: 1px solid var(--dim); padding: 3px 10px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; font-size: 10px; border-radius: 2px; transition: all 0.1s; } .scene-btn:hover { border-color: var(--border); color: var(--text); } .scene-btn.active { background: var(--dim); border-color: var(--accent6); color: var(--accent6); } #btnAuto { border-color: var(--accent4); color: var(--accent4); } #btnAuto.paused { border-color: var(--dim); color: var(--subtle); }

#info { flex: 1; min-width: 280px; max-width: 380px; font-size: 11px; font-family: 'IBM Plex Mono', monospace; }

.scene-title { font-size: 12px; color: var(--gold); padding: 0 0 8px; margin-bottom: 12px; border-bottom: 1px solid var(--dim); letter-spacing: 0.04em; } .prose { font-family: 'IBM Plex Sans', sans-serif; font-weight: 300; font-size: 12px; line-height: 1.7; color: #9096b8; margin-bottom: 14px; } .prose em { color: var(--accent6); font-style: normal; font-family: 'IBM Plex Mono', monospace; font-size: 11px; } .prose strong { color: var(--text); font-weight: 400; }

.section-label { font-size: 9px; color: var(--subtle); letter-spacing: 0.1em; text-transform: uppercase; margin: 12px 0 5px; }

table.terms { width: 100%; border-collapse: collapse; font-size: 10px; margin-bottom: 12px; } table.terms td { padding: 4px 6px; vertical-align: top; } table.terms tr { border-bottom: 1px solid var(--border); } .tk { color: var(--accent6); white-space: nowrap; width: 106px; } .tv { color: var(--subtle); line-height: 1.5; font-family: 'IBM Plex Sans', sans-serif; font-size: 11px; }

.ref-box { border-left: 2px solid var(--gold); padding: 6px 10px; font-size: 10px; color: #a08858; line-height: 1.6; background: #0d0c06; margin-bottom: 10px; border-radius: 0 2px 2px 0; font-family: 'IBM Plex Sans', sans-serif; } .note-box { border-left: 2px solid var(--accent3); padding: 6px 10px; font-size: 10px; color: #5580a8; line-height: 1.6; background: #05080f; border-radius: 0 2px 2px 0; font-family: 'IBM Plex Sans', sans-serif; font-style: italic; } </style>

</head>
<body><header>
  <h1>SGA3 · Exposé IX · Groupes de type multiplicatif</h1>
  <span>Grothendieck et al., Séminaire de Géométrie Algébrique du Bois Marie, 1962–64</span>
</header><div id="layout">
  <div id="canvasWrap">
    <canvas id="c" width="640" height="480"></canvas>
    <div id="controls">
      <div class="cg">
        <span class="lbl">scene</span>
        <button class="scene-btn active" id="btn0" onclick="setScene(0)">0·diag</button>
        <button class="scene-btn" id="btn1" onclick="setScene(1)">1·torsion</button>
        <button class="scene-btn" id="btn2" onclick="setScene(2)">2·lift</button>
        <button class="scene-btn" id="btn3" onclick="setScene(3)">3·ext</button>
      </div>
      <div class="cg">
        <span class="lbl">θ</span>
        <input type="range" id="slA" min="0" max="360" step="0.5" value="24" oninput="manualAngle(this.value)">
        <span class="val" id="vA">24.0°</span>
      </div>
      <div class="cg">
        <span class="lbl">z</span>
        <input type="range" id="slZ" min="0.15" max="3.0" step="0.05" value="1.0" oninput="manualZoom(this.value)">
        <span class="val" id="vZ">1.00</span>
      </div>
      <div class="cg">
        <span class="lbl">n</span>
        <input type="range" id="slN" min="1" max="60" step="1" value="12" oninput="manualN(this.value)">
        <span class="val" id="vN">12</span>
      </div>
      <button class="scene-btn active" id="btnAuto" onclick="toggleAuto()">⏵ auto</button>
    </div>
  </div>  <div id="info"><!-- populated by JS --></div>
</div><script>
// =============================================================================
//  Constants
// =============================================================================
const S  = 2;              // render scale (canvas 640×480 = 2× the logical 320×240)
const W  = 320;            // logical width
const H  = 240;            // logical height
const SRC_W  = 64;
const SRC_H  = 64;
const WARP_W = 132;
const WARP_H = 132;
const ANGLE_STEPS = 3600;  // 0.1° resolution

// =============================================================================
//  Color table
// =============================================================================
const C = {
  BG:     '#000000',
  PANEL:  'rgb(16,16,16)',
  FRAME:  'rgb(90,95,90)',
  TEXT:   '#ffffff',
  SUBTLE: 'rgb(45,48,52)',
  A1: '#ff3333',
  A2: '#00ff44',
  A3: '#0044ff',
  A4: '#ffee00',
  A5: '#ff22ff',
  A6: '#00eeff',
};

// =============================================================================
//  State
// =============================================================================
let gAngle = 24.0, gZoom = 1.0, gScene = 0, gN = 12, gAuto = true;
let gT0 = performance.now();

// =============================================================================
//  Canvas setup
// =============================================================================
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// Off-screen warp canvas (drawn every frame)
const warpCanvas = document.createElement('canvas');
warpCanvas.width  = WARP_W;
warpCanvas.height = WARP_H;
const warpCtx = warpCanvas.getContext('2d');

// Off-screen source canvas (built once)
const srcCanvas = document.createElement('canvas');
srcCanvas.width  = SRC_W;
srcCanvas.height = SRC_H;
const srcCtx = srcCanvas.getContext('2d');

// =============================================================================
//  Trigonometric LUT
// =============================================================================
const sinLUT = new Float32Array(ANGLE_STEPS);
const cosLUT = new Float32Array(ANGLE_STEPS);
for (let i = 0; i < ANGLE_STEPS; i++) {
  const a = i * Math.PI / 1800;
  sinLUT[i] = Math.sin(a);
  cosLUT[i] = Math.cos(a);
}
function degToIdx(deg) {
  let i = Math.round(deg * 10) % ANGLE_STEPS;
  return (i + ANGLE_STEPS) % ANGLE_STEPS;
}
function SIN(i) { return sinLUT[((i % ANGLE_STEPS) + ANGLE_STEPS) % ANGLE_STEPS]; }
function COS(i) { return cosLUT[((i % ANGLE_STEPS) + ANGLE_STEPS) % ANGLE_STEPS]; }

// =============================================================================
//  Polar LUT for the warp renderer
// =============================================================================
const polarLUT = new Array(WARP_W * WARP_H);
(function buildPolarLUT() {
  const cx   = (WARP_W - 1) * 0.5;
  const cy   = (WARP_H - 1) * 0.5;
  const maxR = (Math.min(WARP_W, WARP_H) - 1) * 0.5;
  for (let y = 0; y < WARP_H; y++) {
    for (let x = 0; x < WARP_W; x++) {
      const dx = (x - cx) / maxR;
      const dy = (y - cy) / maxR;
      const r  = Math.sqrt(dx * dx + dy * dy);
      const a  = Math.atan2(dy, dx);
      let idx  = Math.round((a + Math.PI) * ANGLE_STEPS / (2 * Math.PI));
      idx      = ((idx % ANGLE_STEPS) + ANGLE_STEPS) % ANGLE_STEPS;
      polarLUT[y * WARP_W + x] = {
        inside:   r <= 1.0,
        angleIdx: idx,
        radius:   Math.min(r, 1.0)
      };
    }
  }
})();

// =============================================================================
//  Source object (64×64 RGBA raw buffer)
// =============================================================================
const srcRGBA = new Uint8ClampedArray(SRC_W * SRC_H * 4);
function spx(x, y, r, g, b) {
  if (x < 0 || x >= SRC_W || y < 0 || y >= SRC_H) return;
  const p = ((y | 0) * SRC_W + (x | 0)) * 4;
  srcRGBA[p] = r; srcRGBA[p+1] = g; srcRGBA[p+2] = b; srcRGBA[p+3] = 255;
}
(function buildSourceObject() {
  const cx = SRC_W / 2, cy = SRC_H / 2;

  for (let i = 0; i < SRC_W * SRC_H; i++) {
    const p = i * 4;
    srcRGBA[p] = 8; srcRGBA[p+1] = 10; srcRGBA[p+2] = 18; srcRGBA[p+3] = 255;
  }

  for (let y = 0; y < SRC_H; y++) {
    for (let x = 0; x < SRC_W; x++) {
      if ((x % 8) === 0 || (y % 8) === 0) spx(x, y, 18, 26, 40);
    }
  }

  for (let y = 0; y < SRC_H; y++) {
    for (let x = 0; x < SRC_W; x++) {
      const dx = (x - cx) / 24;
      const dy = (y - cy) / 24;
      const r = Math.sqrt(dx*dx + dy*dy);
      if (r <= 1.0) {
        const v = Math.min(255, (56 + (1 - r) * 128) | 0);
        spx(x, y, v, (v * 0.45) | 0, (255 - v * 0.35) | 0);
      }
    }
  }

  for (let a = 0; a < ANGLE_STEPS; a += 4) {
    spx(Math.round(cx + cosLUT[a] * 24), Math.round(cy + sinLUT[a] * 24), 90, 95, 90);
  }

  for (let i = -20; i <= 20; i++) {
    spx(Math.round(cx+i), Math.round(cy), 220, 220, 220);
    spx(Math.round(cx), Math.round(cy+i), 220, 220, 220);
  }

  for (let i = -18; i <= 18; i++) {
    spx(Math.round(cx+i), Math.round(cy-i/2), 255, 238, 0);
    if ((i & 1) === 0) spx(Math.round(cx+i), Math.round(cy-i/2+1), 255, 238, 0);
  }

  for (let yy = -3; yy <= 3; yy++) {
    for (let xx = -3; xx <= 3; xx++) {
      if (xx*xx + yy*yy <= 9) spx(Math.round(cx+14+xx), Math.round(cy-9+yy), 255, 80, 20);
    }
  }
  for (let yy = -2; yy <= 2; yy++) {
    for (let xx = -2; xx <= 2; xx++) {
      if (xx*xx + yy*yy <= 4) spx(Math.round(cx-11+xx), Math.round(cy+12+yy), 0, 255, 68);
    }
  }

  srcCtx.putImageData(new ImageData(srcRGBA, SRC_W, SRC_H), 0, 0);
})();

// =============================================================================
//  Bilinear source sampler
// =============================================================================
function sampleSrc(fx, fy) {
  if (fx < 0 || fy < 0 || fx >= SRC_W - 1 || fy >= SRC_H - 1) return [4, 7, 12];
  const x0 = fx | 0, y0 = fy | 0;
  const tx = fx - x0, ty = fy - y0;
  const p00 = (y0 * SRC_W + x0) * 4;
  const p10 = p00 + 4, p01 = p00 + SRC_W * 4, p11 = p01 + 4;
  const d = srcRGBA;
  const s = (1 - tx) * (1 - ty), t = tx * (1 - ty), u = (1 - tx) * ty, v = tx * ty;
  return [
    d[p00]   * s + d[p10]   * t + d[p01]   * u + d[p11]   * v,
    d[p00+1] * s + d[p10+1] * t + d[p01+1] * u + d[p11+1] * v,
    d[p00+2] * s + d[p10+2] * t + d[p01+2] * u + d[p11+2] * v
  ];
}

// =============================================================================
//  Warp renderer
// =============================================================================
function renderPolarWarp(angleDeg, zoom, srcCx, srcCy, srcRadius) {
  const img   = warpCtx.createImageData(WARP_W, WARP_H);
  const d     = img.data;
  const rotIdx = degToIdx(angleDeg);
  const invZ   = 1.0 / Math.max(0.15, zoom);

  for (let i = 0; i < polarLUT.length; i++) {
    const e = polarLUT[i];
    let r, g, b;
    if (!e.inside) {
      r = 4; g = 7; b = 12;
    } else {
      const idx    = (e.angleIdx + rotIdx) % ANGLE_STEPS;
      const radius = e.radius * srcRadius * invZ;
      const rgb    = sampleSrc(srcCx + cosLUT[idx] * radius, srcCy + sinLUT[idx] * radius);
      r = rgb[0] | 0; g = rgb[1] | 0; b = rgb[2] | 0;
    }
    const p = i * 4;
    d[p] = r; d[p+1] = g; d[p+2] = b; d[p+3] = 255;
  }
  warpCtx.putImageData(img, 0, 0);
}

// =============================================================================
//  Drawing helpers — logical coordinates in 320×240 space
// =============================================================================
function rrect(x, y, w, h, r) {
  ctx.beginPath();
  if (ctx.roundRect) {
    ctx.roundRect(x, y, w, h, r);
  } else {
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }
}

function fillPanel(x, y, w, h) {
  ctx.fillStyle = C.PANEL;  rrect(x, y, w, h, 6); ctx.fill();
  ctx.strokeStyle = C.FRAME; ctx.lineWidth = 0.5; rrect(x, y, w, h, 6); ctx.stroke();
}

function drawTitleBar(title, sub) {
  ctx.fillStyle = 'rgb(24,26,36)';
  ctx.fillRect(0, 0, W, 18);
  ctx.fillStyle = '#c8a84b';
  ctx.font = '6px "IBM Plex Mono", monospace';
  ctx.fillText(title, 6, 11);
  if (sub) {
    ctx.fillStyle = C.SUBTLE;
    ctx.fillText(sub, 170, 11);
  }
}

function drawFooter(angle, zoom, scene, n) {
  ctx.fillStyle = 'rgb(18,20,28)';
  ctx.fillRect(0, 208, W, 32);
  ctx.fillStyle = 'rgb(80,85,100)';
  ctx.font = '5.5px "IBM Plex Mono", monospace';
  ctx.fillText(`scene=${scene}  θ=${angle.toFixed(1)}°  z=${zoom.toFixed(3)}  n=${n}`, 6, 218);
  ctx.fillText('terms: D(M) · mult. type · [n] · G[n] · nilpotent J · exact seq.', 6, 230);
}

function drawTermBox(x, y, w, h, term, meaning, accent) {
  ctx.strokeStyle = accent; ctx.lineWidth = 0.4;
  rrect(x, y, w, h, 4); ctx.stroke();
  ctx.fillStyle = 'rgb(30,32,42)';
  ctx.fillRect(x + 1, y + 1, w - 2, 11);
  ctx.fillStyle = accent;
  ctx.font = '5px "IBM Plex Mono", monospace';
  ctx.fillText(term, x + 4, y + 9);
  ctx.fillStyle = 'rgb(130,135,155)';
  ctx.fillText(meaning, x + 4, y + 20);
}

function drawArrow(x1, y1, x2, y2, col) {
  ctx.strokeStyle = col; ctx.lineWidth = 0.7;
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  const dx = x2 - x1, dy = y2 - y1, len = Math.sqrt(dx*dx + dy*dy);
  if (len < 2) return;
  const ux = dx / len, uy = dy / len, px = -uy, py = ux;
  const ax = x2 - ux * 6, ay = y2 - uy * 6;
  ctx.beginPath();
  ctx.moveTo(x2, y2); ctx.lineTo(ax + px * 3, ay + py * 3);
  ctx.moveTo(x2, y2); ctx.lineTo(ax - px * 3, ay - py * 3);
  ctx.stroke();
}

function txt(x, y, s, col, fnt) {
  ctx.fillStyle = col || C.TEXT;
  ctx.font = fnt || '6px "IBM Plex Mono", monospace';
  ctx.fillText(s, x, y);
}

// =============================================================================
//  Scene 0 — multiplicative type and the diagonalizable case
// =============================================================================
function sceneDiagonalizable() {
  fillPanel(4, 20, 154, 150);
  fillPanel(164, 20, 152, 150);

  // Left panel: split/diagonalizable model (Exposé VIII background)
  ctx.drawImage(srcCanvas, 12, 28, 64, 64);
  txt(12, 106, 'split model on the source chart', 'rgb(140,145,165)', '5px monospace');
  txt(12, 116, 'diagonalizable case D(M)',       'rgb(140,145,165)', '5px monospace');
  txt(12, 126, 'background for type multiplicatif', 'rgb(140,145,165)', '5px monospace');

  // Right panel: base change to a splitting cover, then a visual twist
  renderPolarWarp(gAngle, gZoom, SRC_W / 2, SRC_H / 2, 24.0);
  const hwx = WARP_W / 2, hwy = WARP_H / 2;

  warpCtx.strokeStyle = 'rgba(90,95,90,0.8)';
  warpCtx.lineWidth = 0.6;
  warpCtx.beginPath(); warpCtx.arc(hwx, hwy, 48, 0, 2 * Math.PI); warpCtx.stroke();
  warpCtx.strokeStyle = 'rgba(45,48,52,0.7)';
  warpCtx.lineWidth = 0.5;
  warpCtx.beginPath(); warpCtx.moveTo(hwx - 50, hwy); warpCtx.lineTo(hwx + 50, hwy); warpCtx.stroke();
  warpCtx.beginPath(); warpCtx.moveTo(hwx, hwy - 50); warpCtx.lineTo(hwx, hwy + 50); warpCtx.stroke();
  warpCtx.fillStyle = 'rgba(200,168,75,0.9)';
  warpCtx.font = '6px monospace';
  warpCtx.fillText('after fpqc splitting cover', 4, 10);
  warpCtx.fillText('visual encoding of descent data', 4, 20);

  ctx.drawImage(warpCanvas, 170, 28, 132, 132);

  txt(170, 106, 'fpqc cover S\' → S', 'rgb(140,145,165)', '5px monospace');
  txt(170, 116, 'locally D_S(M) after descent', 'rgb(140,145,165)', '5px monospace');
  txt(170, 126, 'rotation/zoom are only a visual code', 'rgb(140,145,165)', '5px monospace');

  drawTermBox(248,  30,  66, 32, 'D(M)',     'Spec(Z[M])',                    C.A1);
  drawTermBox(248,  66,  66, 32, 'mult.type','fpqc-loc. diagonalizable',       C.A2);
  drawTermBox(248, 102,  66, 32, 'fpqc',     'faithfully flat qc cover',       C.A4);
  drawTermBox(248, 138,  66, 26, 'base chg', 'G ×_S S\'',                      C.A6);
}

// =============================================================================
//  Scene 1 — n-torsion and schematic density
// =============================================================================
function drawKernelRow(x, y, w, n, phaseDeg) {
  const cx = x + 24, cy = y + 10, r = 9;
  ctx.strokeStyle = C.FRAME; ctx.lineWidth = 0.4;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, 2 * Math.PI); ctx.stroke();
  ctx.strokeStyle = C.SUBTLE; ctx.lineWidth = 0.3;
  ctx.beginPath(); ctx.moveTo(cx - r - 4, cy); ctx.lineTo(cx + r + 4, cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, cy - r - 4); ctx.lineTo(cx, cy + r + 4); ctx.stroke();

  const phaseIdx = degToIdx(phaseDeg);
  for (let k = 0; k < n; k++) {
    const idx = (phaseIdx + Math.round(k * ANGLE_STEPS / n)) % ANGLE_STEPS;
    const px = cx + Math.round(COS(idx) * r);
    const py = cy + Math.round(SIN(idx) * r);
    ctx.fillStyle = k === 0 ? C.A1 : (k % 2 ? C.A4 : C.A6);
    ctx.beginPath(); ctx.arc(px, py, 2, 0, 2 * Math.PI); ctx.fill();
  }

  txt(x + 48, y + 8,  `n=${n}`,       C.TEXT,   '5px monospace');
  txt(x + 48, y + 18, 'G[n] = ker[n]', C.SUBTLE, '5px monospace');
}

function sceneTorsionDensity() {
  fillPanel(4, 20, 190, 150);
  fillPanel(198, 20, 118, 150);

  txt(12, 31, 'multiplication-by-n',  C.TEXT, '6px monospace');
  txt(12, 43, '[n] : G → G',          C.A6,   '6px monospace');
  txt(12, 55, 'G[n] = ker([n])',      C.A4,   '6px monospace');

  const ns = [2, 3, 4, 5, 6, 8, 12];
  for (let i = 0; i < 7; i++) drawKernelRow(10, 64 + i * 18, 170, ns[i], gAngle);

  drawTermBox(202,  28, 106, 32, 'schem. dense', 'no nonzero function vanishes on all nG', C.A4);
  drawTermBox(202,  66, 106, 32, 'finite type',  'hypothesis of Theorem 4.7',          C.A6);
  drawTermBox(202, 104, 106, 32, 'split fibre',  'picture shown for Gm over kbar',     C.A2);
  drawTermBox(202, 142, 106, 20, 'SGA3 IX §4',   'schematic density theorem',          C.A1);
}

// =============================================================================
//  Scene 2 — nilpotent thickenings, lifting, conjugacy
// =============================================================================
function drawLiftTower(x, y, w, h, levels, bend) {
  ctx.strokeStyle = C.FRAME; ctx.lineWidth = 0.4;
  rrect(x, y, w, h, 6); ctx.stroke();
  const top  = y + 10;
  const step = (h - 24) / levels;
  const mid  = x + w / 2;

  const labels = ['J^0', 'J^1', 'J^2', 'J^3', 'J^4', 'J^5'];

  for (let i = 0; i < levels; i++) {
    const yy = top + i * step;
    const t  = (levels <= 1) ? 0 : i / (levels - 1);
    const dx = Math.round(Math.sin(t * Math.PI) * bend);
    const bw = w - 16 - 2 * dx;
    const col = i === 0 ? C.A1 : (i === levels - 1 ? C.A2 : C.FRAME);
    ctx.strokeStyle = col; ctx.lineWidth = 0.4;
    rrect(x + 8 + dx, yy, bw, step - 6, 4); ctx.stroke();
    txt(x + 8 + dx + 5, yy + step - 13, labels[i] || `J^${i}`, C.TEXT, '5px monospace');

    if (i < levels - 1) {
      const y1 = yy + step - 6;
      const nx2 = mid + Math.round(Math.sin(((i + 1) / (levels - 1)) * Math.PI) * bend);
      drawArrow(mid + dx, y1, nx2, yy + step + 4, C.A4);
    }
  }
}

function drawConjugacyIcon(x, y, w, h, deltaDeg) {
  ctx.strokeStyle = C.FRAME; ctx.lineWidth = 0.4;
  rrect(x, y, w, h, 6); ctx.stroke();
  const cx = x + w / 2, cy = y + h / 2 - 2;
  const r  = Math.floor(Math.min(w, h) / 4);
  ctx.strokeStyle = C.A6; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, 2 * Math.PI); ctx.stroke();
  ctx.strokeStyle = C.SUBTLE; ctx.lineWidth = 0.4;
  ctx.beginPath(); ctx.arc(cx, cy, r - 6, 0, 2 * Math.PI); ctx.stroke();
  const a = deltaDeg * Math.PI / 180 * 0.5;
  const ax = cx + Math.round(Math.cos(a) * r), ay = cy + Math.round(Math.sin(a) * r);
  drawArrow(cx, cy, ax, ay, C.A5);
  ctx.fillStyle = C.A5; ctx.beginPath(); ctx.arc(ax, ay, 3, 0, 2 * Math.PI); ctx.fill();
  txt(x + 6, y + h - 5, 'g ≡ e mod J', C.SUBTLE, '5px monospace');
}

// =============================================================================
//  Main animation loop
// =============================================================================
function render(now) {
  const t = (now - gT0) / 1000;

  if (gAuto) {
    gAngle  = (t * 20) % 360;
    gZoom   = 1.0 + 0.35 * Math.sin(t * 1.2);
    gN      = 2 + (Math.floor(t / 1.2) % 48);
    gScene  = Math.floor(t / 9) % 4;
    syncUI();
  }

  ctx.save();
  ctx.scale(S, S);

  ctx.fillStyle = C.BG;
  ctx.fillRect(0, 0, W, H);
  drawTitleBar('SGA3 Exposé IX – homomorphismes', 'diagonalizable groups as the model case');

  switch (gScene) {
    case 0: sceneDiagonalizable();  break;
    case 1: sceneTorsionDensity();   break;
    case 2: sceneLiftingRigidity();  break;
    case 3: sceneExtensions();       break;
  }

  drawFooter(gAngle, gZoom, gScene, gN);
  ctx.restore();

  refreshInfo();
  requestAnimationFrame(render);
}

function refreshInfo() {
  if (gScene === lastInfoScene) return;
  lastInfoScene = gScene;
  const d = INFO[gScene];
  const rows = d.terms.map(([k, v]) =>
    `<tr><td class="tk">${k}</td><td class="tv">${v}</td></tr>`
  ).join('');
  document.getElementById('info').innerHTML = `
    <div class="scene-title">${d.title}</div>

    <div class="section-label">Key terms</div>
    <table class="terms">${rows}</table>

    <div class="note-box">${d.note}</div>

}

// =============================================================================
//  UI controls
// =============================================================================
function setScene(n) {
  gScene = n;
  gAuto = false;
  const autoBtn = document.getElementById('btnAuto');
  autoBtn.classList.add('paused');
  autoBtn.classList.remove('active');
  autoBtn.textContent = '⏸ auto';
  for (let i = 0; i < 4; i++) {
    document.getElementById('btn' + i).classList.toggle('active', i === n);
  }
}

function toggleAuto() {
  gAuto = !gAuto;
  const btn = document.getElementById('btnAuto');
  btn.classList.toggle('active', gAuto);
  btn.classList.toggle('paused', !gAuto);
  btn.textContent = gAuto ? '⏵ auto' : '⏸ auto';
}

function manualAngle(v) {
  gAngle = parseFloat(v);
  gAuto = false;
  document.getElementById('vA').textContent = parseFloat(v).toFixed(1) + '°';
  const btn = document.getElementById('btnAuto');
  btn.classList.add('paused');
  btn.classList.remove('active');
  btn.textContent = '⏸ auto';
}

function manualZoom(v) {
  gZoom = parseFloat(v);
  gAuto = false;
  document.getElementById('vZ').textContent = parseFloat(v).toFixed(2);
  const btn = document.getElementById('btnAuto');
  btn.classList.add('paused');
  btn.classList.remove('active');
  btn.textContent = '⏸ auto';
}

function manualN(v) {
  gN = parseInt(v, 10);
  gAuto = false;
  document.getElementById('vN').textContent = v;
  const btn = document.getElementById('btnAuto');
  btn.classList.add('paused');
  btn.classList.remove('active');
  btn.textContent = '⏸ auto';
}

function syncUI() {
  document.getElementById('slA').value = gAngle;
  document.getElementById('vA').textContent = gAngle.toFixed(1) + '°';
  document.getElementById('slZ').value = gZoom;
  document.getElementById('vZ').textContent = gZoom.toFixed(2);
  document.getElementById('slN').value = gN;
  document.getElementById('vN').textContent = gN;
  for (let i = 0; i < 4; i++) {
    document.getElementById('btn' + i).classList.toggle('active', i === gScene);
  }
}
